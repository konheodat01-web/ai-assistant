<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Assistant">
  <meta name="description" content="Trợ lý AI cá nhân - Quản lý GSC, viết bài SEO và nhiều hơn nữa">
  <title>AI Assistant</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-avatar" id="user-avatar">🤖</div>
    <div class="header-info">
      <div class="header-name" id="user-name">Trợ lý AI</div>
      <div class="header-status" id="user-status">Đang kết nối...</div>
    </div>
    <button class="header-btn" id="logout-btn" title="Đăng xuất" style="display:none; font-size:14px">🚪</button>
    <button class="header-btn" id="clear-btn" title="Xóa hội thoại">🗑️</button>
    <button class="header-btn" id="settings-btn" title="Cài đặt">⚙️</button>
  </header>

  <!-- CHAT AREA -->
  <main class="chat-area" id="chat-area">
    <!-- Typing indicator (luôn ở cuối) -->
    <div class="typing-indicator" id="typing-indicator">
      <div class="msg-avatar">🤖</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </main>

  <!-- INPUT AREA -->
  <footer class="input-area">
    <div class="input-wrap">
      <textarea
        id="msg-input"
        placeholder="Nhắn lệnh hoặc đặt câu hỏi..."
        rows="1"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      ></textarea>
    </div>
    <button class="send-btn" id="send-btn" title="Gửi">➤</button>
  </footer>

</div>

<!-- SETTINGS PANEL -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel">
    <div class="settings-title">
      ⚙️ Cài đặt
      <span class="settings-close" id="settings-close">✕</span>
    </div>

    <div class="setting-group">
      <div class="setting-label">🔗 Webhook URL (n8n Orchestrator)</div>
      <input
        type="url"
        class="setting-input"
        id="setting-webhook"
        placeholder="https://your-vps/webhook/ai-orchestrator"
      >
    </div>

    <div class="setting-group">
      <div class="setting-label">ℹ️ Hướng dẫn kết nối</div>
      <p style="font-size:12px;color:#8888aa;line-height:1.6">
        1. Mở <strong style="color:#e8e8f0">https://103.82.195.87</strong> trên trình duyệt<br>
        2. Chấp nhận cảnh báo bảo mật SSL<br>
        3. Quay lại app và gửi tin nhắn thử
      </p>
    </div>

    <button class="save-btn" id="save-settings">💾 Lưu cài đặt</button>
  </div>
</div>

<!-- LOGIN OVERLAY -->
<div class="settings-overlay" id="login-overlay" style="display:flex; z-index:9999; background: rgba(0,0,0,0.9); align-items: center; justify-content: center;">
  <div class="settings-panel" style="text-align: center; padding: 40px 20px; border-radius: 18px; border-top: none; margin: 0 20px; width: auto; animation: fadeInUp 0.3s ease;">
    <div style="font-size: 48px; margin-bottom: 20px;">🤖</div>
    <h2 style="margin-bottom: 10px;">Đăng Nhập</h2>
    <p style="color: #8888aa; margin-bottom: 30px; font-size: 14px;">Đăng nhập để đồng bộ lịch sử chat trên các thiết bị</p>
    <button class="save-btn" id="login-google-btn" style="background: white; color: black; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px;">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.874 2.684-6.615Z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"/></svg>
      Đăng nhập với Google
    </button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
